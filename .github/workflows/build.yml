name: Build APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Initialize Buildozer (Generate Spec)
      run: |
        buildozer init
        # Forzar la aceptación automática de licencias dentro del archivo spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec

    - name: Pre-accept Android Licenses
      run: |
        # Este comando busca las herramientas de Android que descargue Buildozer y acepta los términos antes de compilar
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
    - name: Build with Buildozer
      run: |
        # Usamos un truco de consola para enviar "y" automáticamente si el SDK de Google vuelve a preguntar algo
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Kivy-App-APK
        path: bin/*.apk
        
