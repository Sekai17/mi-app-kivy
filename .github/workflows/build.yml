name: build-android
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04 # IMPORTANTE: no uses 24.04 ni latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libssl-dev libffi-dev \
            libsqlite3-dev libltdl-dev

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install "cython==0.29.36" "buildozer==1.5.0"

      - name: Build APK
        run: buildozer -v android debug
        env:
          # acepta licencias automáticamente
          ACCEPT_SDK_LICENSE: y

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
